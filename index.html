<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Queue-System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="queue-vibe">
      <div class="brand-bar">
        <div class="title-section">
          <h1><i class="fas fa-hospital-user"></i>Queue-System</h1>
          <p>smart flow · care first</p>
        </div>
        <div class="badge-pulse">
          <i class="fas fa-sync-alt fa-fw"></i> auto-refresh active
        </div>
      </div>

      <div class="glass-card">
        <h2>New Patient</h2>
        <form id="patientForm">
          <div class="form-row">
            <div class="input-group">
              <label>Full Name</label>
              <input
                type="text"
                id="name"
                required
                placeholder="e.g., Eldson Caicedo"
              />
            </div>
            <div class="input-group">
              <label>Phone</label>
              <input
                type="tel"
                id="phone"
                required
                placeholder="+254 7XX XXX XXX"
              />
            </div>
          </div>
          <div class="input-group">
            <label>Chief Complaint</label>
            <textarea
              id="complaint"
              rows="2"
              required
              placeholder="Describe main symptoms / reason for visit"
            ></textarea>
          </div>
          <button type="submit" class="btn-primary">
            <i class="fas fa-plus-circle"></i> Add to Queue
          </button>
        </form>
      </div>

      <div class="action-bar">
        <div class="queue-stats">
          <i class="fas fa-users"></i> <span id="queueCount">0</span> waiting
        </div>
        <button id="callNextBtn" class="btn-primary btn-call">
          <i class="fas fa-bell"></i> Call Next
        </button>
      </div>

      <div id="queueContainer" class="queue-grid">
        <div class="empty-state">
          <i class="fas fa-queue"></i>
          <p>Loading queue ...</p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
